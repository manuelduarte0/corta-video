<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Corta Vídeo Simples</title>
    <style>
        body { font-family: Arial, sans-serif; background: #1a1a1a; color: white; margin: 0; padding: 15px; }
     .container { max-width: 600px; margin: 0 auto; background: #2d2d2d; padding: 20px; border-radius: 16px; }
        h1 { text-align: center; font-size: 22px; margin-bottom: 20px; }
        input[type="file"] { width: 100%; padding: 12px; background: #3d3d3d; border-radius: 8px; margin-bottom: 15px; box-sizing: border-box; }
        video { width: 100%; border-radius: 8px; margin: 15px 0; background: black; min-height: 200px; }
     .controles { display: flex; gap: 10px; margin: 15px 0; }
     .controles input { flex: 1; padding: 10px; border-radius: 8px; border: none; background: #3d3d3d; color: white; text-align: center; }
        button { width: 100%; padding: 15px; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        #gravarBtn { background: #dc3545; color: white; }
        #gravarBtn:disabled { background: #555; }
        #baixarBtn { background: #28a745; color: white; display: none; text-decoration: none; text-align: center; }
        #status { margin-top: 15px; font-size: 14px; color: #aaa; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Corta Vídeo Simples ✂️</h1>

        <input type="file" id="inputVideo" accept="video/*">
        <video id="preview" controls playsinline></video>

        <div class="controles">
            <input type="number" id="inicio" placeholder="Início (s)" min="0" step="0.1">
            <input type="number" id="fim" placeholder="Fim (s)" min="0" step="0.1">
        </div>

        <button id="previewBtn" onclick="testarTrecho()">▶️ Testar trecho</button>
        <button id="gravarBtn" onclick="gravarTrecho()" disabled>🔴 Gravar Corte</button>
        <a id="baixarBtn" class="btn-download">Baixar Vídeo Cortado</a>

        <p id="status">Selecione um vídeo MP4 pra começar</p>
    </div>

    <script>
        const inputVideo = document.getElementById('inputVideo');
        const preview = document.getElementById('preview');
        const gravarBtn = document.getElementById('gravarBtn');
        const baixarBtn = document.getElementById('baixarBtn');
        const status = document.getElementById('status');
        let mediaRecorder;
        let chunks = [];

        inputVideo.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                preview.src = URL.createObjectURL(file);
                preview.onloadedmetadata = () => {
                    document.getElementById('inicio').value = 0;
                    document.getElementById('fim').value = preview.duration.toFixed(1);
                    gravarBtn.disabled = false;
                    status.innerText = `Vídeo carregado: ${preview.duration.toFixed(1)}s`;
                };
            }
        });

        function testarTrecho() {
            const inicio = parseFloat(document.getElementById('inicio').value) || 0;
            const fim = parseFloat(document.getElementById('fim').value) || preview.duration;
            preview.currentTime = inicio;
            preview.play();
            setTimeout(() => preview.pause(), (fim - inicio) * 1000);
        }

        async function gravarTrecho() {
            const inicio = parseFloat(document.getElementById('inicio').value) || 0;
            const fim = parseFloat(document.getElementById('fim').value) || preview.duration;
            const duracao = fim - inicio;

            if (inicio >= fim) {
                alert('Início deve ser menor que o fim');
                return;
            }

            gravarBtn.disabled = true;
            baixarBtn.style.display = 'none';
            status.innerText = 'Gravando o trecho... não mexe';

            // Pega o stream do vídeo
            const stream = preview.captureStream();
            mediaRecorder = new MediaRecorder(stream, { mimeType: 'video/webm' });

            mediaRecorder.ondataavailable = e => chunks.push(e.data);
            mediaRecorder.onstop = () => {
                const blob = new Blob(chunks, { type: 'video/webm' });
                baixarBtn.href = URL.createObjectURL(blob);
                baixarBtn.download = 'video-cortado.webm';
                baixarBtn.style.display = 'block';
                chunks = [];
                status.innerText = 'Pronto! Clica pra baixar';
                gravarBtn.disabled = false;
            };

            preview.currentTime = inicio;
            preview.play();
            mediaRecorder.start();

            setTimeout(() => {
                mediaRecorder.stop();
                preview.pause();
            }, duracao * 1000);
        }
    </script>
</body>
</html>
